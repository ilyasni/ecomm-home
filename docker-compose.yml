services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      HOST: ${STRAPI_HOST}
      PORT: ${STRAPI_PORT}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      ADMIN_ENCRYPTION_KEY: ${ADMIN_ENCRYPTION_KEY}
      ADMIN_REFRESH_TOKEN_MAX_LIFESPAN: ${ADMIN_REFRESH_TOKEN_MAX_LIFESPAN}
      ADMIN_SESSION_MAX_LIFESPAN: ${ADMIN_SESSION_MAX_LIFESPAN}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      MINIO_ENDPOINT_URL: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9002}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-strapi-uploads}
      MINIO_REGION: us-east-1
      FRONTEND_INTERNAL_URL: http://frontend:3000
      REINDEX_SECRET: ${REINDEX_SECRET}
    ports:
      - "1337:1337"
    volumes:
      - ./cms:/opt/app
      - cms_node_modules:/opt/app/node_modules
      - strapi_uploads:/opt/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://0.0.0.0:1337/_health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  medusa_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MEDUSA_POSTGRES_DB}
      POSTGRES_USER: ${MEDUSA_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MEDUSA_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - medusa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEDUSA_POSTGRES_USER} -d ${MEDUSA_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  medusa:
    build:
      context: ./medusa
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      medusa_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${MEDUSA_POSTGRES_USER}:${MEDUSA_POSTGRES_PASSWORD}@medusa_postgres:5432/${MEDUSA_POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${MEDUSA_JWT_SECRET}
      COOKIE_SECRET: ${MEDUSA_COOKIE_SECRET}
      STORE_CORS: ${MEDUSA_STORE_CORS}
      ADMIN_CORS: ${MEDUSA_ADMIN_CORS}
      AUTH_CORS: ${MEDUSA_AUTH_CORS}
      NODE_ENV: development
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-test_shop}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-test_secret_key}
    ports:
      - "9000:9000"
    volumes:
      - ./medusa:/server
      - medusa_node_modules:/server/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 180s

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-strapi-uploads}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set public local/$$MINIO_BUCKET &&
        echo 'MinIO bucket $$MINIO_BUCKET is ready and public'
      "
    restart: "no"

  imgproxy:
    image: darthsim/imgproxy:v3.24
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_USE_S3: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://minio:9000
      IMGPROXY_S3_REGION: us-east-1
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/imgproxy", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://0.0.0.0:7700/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    # npm install синхронизирует node_modules volume при каждом старте контейнера.
    # Необходимо: именованный volume может быть устаревшим после изменения package.json.
    command: sh -c "npm install --prefer-offline && npm run dev"
    depends_on:
      cms:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://0.0.0.0:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    environment:
      NEXT_PUBLIC_STRAPI_URL: http://localhost:1337
      NEXT_PUBLIC_STRAPI_MEDIA_URL: http://localhost:1337
      STRAPI_INTERNAL_URL: http://cms:1337
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN}
      STRAPI_MEDIA_HOSTNAME: cms
      MEDUSA_BACKEND_URL: http://medusa:9000
      MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY}
      MEDUSA_ADMIN_EMAIL: ${MEDUSA_ADMIN_EMAIL}
      MEDUSA_ADMIN_PASSWORD: ${MEDUSA_ADMIN_PASSWORD}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-test_shop}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-test_secret_key}
      CDEK_CLIENT_ID: ${CDEK_CLIENT_ID:-test_client}
      CDEK_CLIENT_SECRET: ${CDEK_CLIENT_SECRET:-test_secret}
      CDEK_FROM_CITY_CODE: ${CDEK_FROM_CITY_CODE:-44}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILI_MASTER_KEY}
      REINDEX_SECRET: ${REINDEX_SECRET}
      IMGPROXY_URL: http://imgproxy:8080
      NEXT_PUBLIC_IMGPROXY_URL: http://localhost:8080
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_SOURCE_REWRITE_FROM: http://localhost:1337
      IMGPROXY_SOURCE_REWRITE_TO: http://cms:1337
      IMGPROXY_SOURCE_REWRITE_FROM_2: http://localhost:9002
      IMGPROXY_SOURCE_REWRITE_TO_2: http://minio:9000
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Vita Brava Home <noreply@vitabrava.ru>}
      EMAIL_ADMIN: ${EMAIL_ADMIN:-}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  postgres_data:
  redis_data:
  cms_node_modules:
  strapi_uploads:
  frontend_node_modules:
  frontend_next:
  medusa_postgres_data:
  medusa_node_modules:
  meilisearch_data:
  minio_data:
