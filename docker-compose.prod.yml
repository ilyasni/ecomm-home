services:
  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_HOST: ${POSTGRES_HOST:?}
      DATABASE_PORT: ${POSTGRES_PORT:?5432}
      DATABASE_NAME: ${POSTGRES_DB:?}
      DATABASE_USERNAME: ${POSTGRES_USER:?}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?}
      HOST: ${STRAPI_HOST:?0.0.0.0}
      PORT: ${STRAPI_PORT:?1337}
      APP_KEYS: ${STRAPI_APP_KEYS:?}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT:?}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:?}
      ADMIN_ENCRYPTION_KEY: ${ADMIN_ENCRYPTION_KEY:?}
      ADMIN_REFRESH_TOKEN_MAX_LIFESPAN: ${ADMIN_REFRESH_TOKEN_MAX_LIFESPAN:?604800}
      ADMIN_SESSION_MAX_LIFESPAN: ${ADMIN_SESSION_MAX_LIFESPAN:?86400}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT:?}
      JWT_SECRET: ${STRAPI_JWT_SECRET:?}
      REDIS_HOST: ${REDIS_HOST:-}
      REDIS_PORT: ${REDIS_PORT:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - strapi_uploads:/opt/app/public/uploads
    expose:
      - "1337"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:1337/_health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      cms:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:?}
      NEXT_PUBLIC_STRAPI_MEDIA_URL: ${NEXT_PUBLIC_STRAPI_MEDIA_URL:?}
      STRAPI_MEDIA_HOSTNAME: ${STRAPI_MEDIA_HOSTNAME:?}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:?}
      STRAPI_INTERNAL_URL: http://cms:1337
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  strapi_uploads:
